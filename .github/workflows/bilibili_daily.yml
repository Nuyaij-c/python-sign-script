name: Bilibili 每日任务

on:
  # 改为北京时间9:15执行（UTC 1:15），避开高峰
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bilibili-task:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 拉取代码仓库
        uses: actions/checkout@v4
      
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: 随机延迟（0-3分钟），降低风控
        run: |
          sleep $((RANDOM % 180))
      
      - name: 执行哔哩哔哩每日任务
        env:
          BILI_COOKIE: ${{ secrets.BILI_COOKIE }}
          COIN_VIDEO_BVS: ${{ secrets.COIN_VIDEO_BVS }}
          WATCH_VIDEO_BV: ${{ secrets.WATCH_VIDEO_BV }}
        run: |
          python bilibili_daily.py
      
      - name: 上传任务日志
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bilibili-daily-log
          path: bilibili_daily.log
          retention-days: 7
