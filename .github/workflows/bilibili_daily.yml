name: Bilibili 每日任务

on:
  # 定时触发：UTC时间0:30 = 北京时间8:30
  schedule:
    - cron: '30 0 * * *'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bilibili-task:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 拉取代码仓库
        uses: actions/checkout@v4
      
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: 执行哔哩哔哩每日任务
        env:
          # 敏感信息从GitHub Secrets读取
          BILI_SID: ${{ secrets.BILI_SID }}
          # 可选配置（也可在Secrets中配置）
          COIN_VIDEO_BVS: ${{ secrets.COIN_VIDEO_BVS }}
          WATCH_VIDEO_BV: ${{ secrets.WATCH_VIDEO_BV }}
        run: |
          python bilibili_daily.py
      
      - name: 上传任务日志
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bilibili-daily-log
          path: bilibili_daily.log
          retention-days: 7
