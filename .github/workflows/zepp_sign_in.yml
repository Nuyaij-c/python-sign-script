# 工作流名称
name: ZeppLife 自动签到

# 触发条件
on:
  # 定时触发（UTC时间，对应北京时间需要+8小时）
  # 示例：北京时间每天8:50执行（UTC时间0:50）
  schedule:
    - cron: '50 0 * * *'
  # 手动触发（在GitHub页面可手动点击运行）
  workflow_dispatch:

# 工作流权限（最小权限原则）
permissions:
  contents: read

# 任务配置
jobs:
  sign-in-job:
    # 运行环境（Ubuntu最新版）
    runs-on: ubuntu-latest
    # 设置超时时间（避免卡任务）
    timeout-minutes: 5
    
    # 步骤定义
    steps:
      # 1. 拉取代码仓库到运行环境
      - name: 拉取代码仓库
        uses: actions/checkout@v4
      
      # 2. 配置Python环境（匹配脚本运行的Python版本）
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 推荐3.8+版本，兼容大部分环境
          cache: 'pip'  # 缓存pip依赖，加速后续运行
      
      # 3. 安装脚本依赖（requests）
      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      # 4. 执行签到脚本（注入GitHub Secrets环境变量）
      - name: 执行ZeppLife签到
        env:
          # 敏感信息从GitHub Secrets读取（需提前配置）
          ZEPP_USERNAME: ${{ secrets.ZEPP_USERNAME }}
          ZEPP_PASSWORD: ${{ secrets.ZEPP_PASSWORD }}
          ZEPP_COOKIE: ${{ secrets.ZEPP_COOKIE }}
          # 非必填配置（可留空，脚本会用默认值）
          ZEPP_BASE_URL: ${{ secrets.ZEPP_BASE_URL }}
          ZEPP_REMOTE: ${{ secrets.ZEPP_REMOTE }}
          ZEPP_STEP_MIN: ${{ secrets.ZEPP_STEP_MIN }}
          ZEPP_STEP_MAX: ${{ secrets.ZEPP_STEP_MAX }}
        run: |
          # 执行签到脚本并输出日志
          python sign_in.py
      
      # 5. 上传日志文件（可选，便于排查问题）
      - name: 上传签到日志
        uses: actions/upload-artifact@v4
        if: always()  # 无论成功失败都上传
        with:
          name: sign-in-log
          path: sign_in.log
          retention-days: 7  # 日志保留7天
